command-help:
  - "&e======== &6GultenClaim Commands &e========"
  - "&6/claim &7- Claims the chunk you are standing in as standard."
  - "&6/claim outpost &7- Claims the chunk you are standing in as an outpost."
  - "&6/claim unclaim &7- Removes the claim in the current chunk."
  - "&6/claim unclaimall &7- Removes all of your claims."
  - "&6/claim trust <player> &7- Trusts a player in your claims."
  - "&6/claim untrust <player> &7- Untrusts a player in your claims."
  - "&6/claim list &7- Lists your claims."
  - "&6/claim info &7- Shows info for the current chunk claim."
  - "&6/claim show &7- Shows claim boundaries."
  - "&6/claim auto &7- Toggles auto-claim mode."
  - "&6/claim map &7- Shows a map of nearby claims."
  - "&6/claim fly &7- Toggles flight mode inside your own claims."
  - "&6/claim setspawn &7- Sets the teleport spawn of the current claim."
  - "&6/claim color <#RRGGBB|reset> &7- Changes your Dynmap claim color. (Premium)"
  - "&6/claim bypass &7- Toggles admin bypass mode."
  - "&6/claim adminunclaim &7- Removes current claim as an admin."
  - "&6/claim reload &7- Reloads config and message files."
  - "&e====================================="

