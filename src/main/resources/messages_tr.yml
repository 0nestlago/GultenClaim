command-help:
  - "&e======== &6GultenClaim Komutları &e========"
  - "&6/claim &7- Durduğunuz chunkı standart claim olarak satın alır."
  - "&6/claim outpost &7- Durduğunuz chunkı karakol (outpost) olarak satın alır."
  - "&6/claim unclaim &7- Durduğunuz chunktaki claimi kaldırır."
  - "&6/claim unclaimall &7- Bütün claimlerinizi kaldırır."
  - "&6/claim trust <oyuncu> &7- Bir oyuncuya claimlerinizde yetki verir."
  - "&6/claim untrust <oyuncu> &7- Bir oyuncunun yetkisini kaldırır."
  - "&6/claim list &7- Sahip olduğunuz claimleri listeler."
  - "&6/claim info &7- Durduğunuz chunktaki claim bilgilerini gösterir."
  - "&6/claim show &7- Claim sınırlarını gösterir."
  - "&6/claim auto &7- Otomatik claim modunu açar/kapatır."
  - "&6/claim map &7- Yakındaki claimlerin haritasını gösterir."
  - "&6/claim fly &7- Claim içinde uçuş modunu açar/kapatır."
  - "&6/claim setspawn &7- Bulunduğunuz claim için ışınlanma noktası belirler."
  - "&6/claim toggle <ayar> &7- Claim ayarını açar/kapatır. (pvp, fire, mob-spawning, explosions, public)"
  - "&6/claim color <#RRGGBB|reset> &7- Dynmap üzerindeki claim renginizi değiştirir. (Premium)"
  - "&6/claim bypass &7- Admin koruma bypass modunu açar."
  - "&6/claim adminunclaim &7- Admin olarak bulunulan claimi siler."
  - "&6/claim reload &7- Yapılandırma dosyalarını yeniler."
  - "&e====================================="

